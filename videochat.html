<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Videochat</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Rubik:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

  :root{
    --bg:#0B0E14;
    --bg2:#11161F;
    --card:#161D29;
    --line:#232C3A;
    --neon:#FFD23F;
    --neon2:#3FD2FF;
    --text:#E7EAF0;
    --muted:#8A94A6;
    --danger:#FF6B6B;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:radial-gradient(circle at 20% -10%, #1A2233 0%, var(--bg) 55%);
    color:var(--text);
    font-family:'Rubik',sans-serif;
    min-height:100vh;
  }

  .navbar{
    height:60px;background:rgba(11,14,20,0.9);backdrop-filter:blur(8px);
    border-bottom:1px solid var(--line);display:flex;align-items:center;
    justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:30;
  }
  .brand{
    color:var(--neon);font-family:'Orbitron',sans-serif;font-weight:800;
    font-size:18px;letter-spacing:1px;text-decoration:none;
  }
  .back{
    color:var(--text);text-decoration:none;font-family:'Orbitron',sans-serif;
    font-size:12px;letter-spacing:.5px;text-transform:uppercase;
    border:1px solid var(--line);padding:8px 14px;border-radius:6px;transition:.2s;
  }
  .back:hover{border-color:var(--neon2);color:var(--neon2);}

  .wrap{max-width:1000px;margin:0 auto;padding:30px 20px 60px;}

  .room-bar{
    display:flex;gap:10px;flex-wrap:wrap;align-items:center;
    background:var(--card);border:1px solid var(--line);border-radius:12px;
    padding:16px;margin-bottom:24px;
  }
  .room-bar input{
    flex:1;min-width:160px;background:var(--bg);border:1px solid var(--line);
    color:var(--text);padding:10px 14px;border-radius:8px;outline:none;font-family:'JetBrains Mono',monospace;
  }
  .room-bar input:focus{border-color:var(--neon2);}
  button{
    font-family:'Orbitron',sans-serif;font-size:11.5px;letter-spacing:.5px;
    text-transform:uppercase;font-weight:700;border:none;border-radius:8px;
    padding:10px 18px;cursor:pointer;transition:transform .15s, box-shadow .15s, opacity .15s;
  }
  button:disabled{opacity:.4;cursor:default;}
  .btn-primary{background:var(--neon);color:#1A1303;}
  .btn-primary:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 6px 16px rgba(255,210,63,.3);}
  .btn-danger{background:var(--danger);color:#2A0707;}
  .btn-danger:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 6px 16px rgba(255,107,107,.3);}
  .btn-ghost{background:transparent;border:1px solid var(--line);color:var(--text);}
  .btn-ghost:hover:not(:disabled){border-color:var(--neon2);color:var(--neon2);}

  .status{
    font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted);
    width:100%;margin-top:6px;
  }
  .status.live{color:var(--neon2);}

  .videos{
    display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:20px;
  }
  .video-box{
    position:relative;background:var(--card);border:1px solid var(--line);
    border-radius:14px;overflow:hidden;aspect-ratio:16/10;
  }
  .video-box video{width:100%;height:100%;object-fit:cover;background:#000;display:block;}
  .video-box .label{
    position:absolute;left:10px;bottom:10px;background:rgba(0,0,0,.55);
    color:var(--neon);font-family:'Orbitron',sans-serif;font-size:11px;
    letter-spacing:.5px;padding:5px 10px;border-radius:6px;
  }
  .video-box.empty::after{
    content:'Kutilmoqda...';position:absolute;top:50%;left:50%;
    transform:translate(-50%,-50%);color:var(--muted);font-size:13px;font-family:'JetBrains Mono',monospace;
  }

  .controls{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
  .controls button.toggled-off{background:var(--line);color:var(--muted);}

  @media (max-width:700px){
    .videos{grid-template-columns:1fr;}
  }
</style>
</head>
<body>

<nav class="navbar">
  <a href="chat.html" class="brand">Browser</a>
  <a href="chat.html" class="back">← Chatga qaytish</a>
</nav>

<div class="wrap">
  <div class="room-bar">
    <input type="text" id="roomInput" placeholder="Xona nomini kiriting (masalan: dasturchilar)">
    <button class="btn-primary" id="joinBtn">Xonaga kirish</button>
    <button class="btn-danger" id="leaveBtn" disabled>Chiqish</button>
    <div class="status" id="statusText">Xonaga kirish uchun nom yozing va tugmani bosing.</div>
  </div>

  <div class="videos">
    <div class="video-box empty" id="localBox">
      <video id="localVideo" autoplay muted playsinline></video>
      <div class="label">Siz</div>
    </div>
    <div class="video-box empty" id="remoteBox">
      <video id="remoteVideo" autoplay playsinline></video>
      <div class="label">Suhbatdosh</div>
    </div>
  </div>

  <div class="controls">
    <button class="btn-ghost" id="micBtn">🎤 Mikrofon</button>
    <button class="btn-ghost" id="camBtn">📷 Kamera</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyC5xBSRqYXhd6HJN9S9v5DQKIlCmLn1mcY",
  authDomain: "chat-65d82.firebaseapp.com",
  databaseURL: "https://chat-65d82-default-rtdb.firebaseio.com",
  projectId: "chat-65d82",
  storageBucket: "chat-65d82.firebasestorage.app",
  messagingSenderId: "361206544968",
  appId: "1:361206544968:web:4944d7e8fdc23c86a7367d"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const roomInput = document.getElementById('roomInput');
const joinBtn = document.getElementById('joinBtn');
const leaveBtn = document.getElementById('leaveBtn');
const statusText = document.getElementById('statusText');
const localVideo = document.getElementById('localVideo');
const remoteVideo = document.getElementById('remoteVideo');
const localBox = document.getElementById('localBox');
const remoteBox = document.getElementById('remoteBox');
const micBtn = document.getElementById('micBtn');
const camBtn = document.getElementById('camBtn');

let pc = null;
let localStream = null;
let roomRef = null;
let myRole = null; // 'caller' or 'callee'
let micOn = true, camOn = true;
let listenersAttached = false;

const servers = {
  iceServers: [{ urls: ['stun:stun.l.google.com:19302', 'stun:stun1.l.google.com:19302'] }]
};

function setStatus(text, live=false){
  statusText.textContent = text;
  statusText.classList.toggle('live', live);
}

async function join(){
  const room = roomInput.value.trim();
  if(!room){ alert("Iltimos, xona nomini kiriting!"); return; }

  joinBtn.disabled = true;
  roomInput.disabled = true;
  setStatus("Kamera va mikrofonga ruxsat so'ralmoqda...");

  try{
    localStream = await navigator.mediaDevices.getUserMedia({ video:true, audio:true });
  }catch(e){
    setStatus("Kamera/mikrofonga ruxsat berilmadi: " + e.message);
    joinBtn.disabled = false;
    roomInput.disabled = false;
    return;
  }
  localVideo.srcObject = localStream;
  localBox.classList.remove('empty');
  leaveBtn.disabled = false;

  pc = new RTCPeerConnection(servers);
  localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

  pc.ontrack = (event) => {
    remoteVideo.srcObject = event.streams[0];
    remoteBox.classList.remove('empty');
    setStatus("Ulanish o'rnatildi ✦ Suhbat davom etmoqda", true);
  };

  roomRef = db.ref('videochat/' + room);

  pc.onicecandidate = (event) => {
    if (event.candidate && myRole){
      roomRef.child(myRole + 'Candidates').push(event.candidate.toJSON());
    }
  };

  const snapshot = await roomRef.once('value');
  const data = snapshot.val();

  if (!data || !data.offer){
    // CALLER: biz birinchi bo'lib kiramiz
    myRole = 'caller';
    setStatus("Xona yaratildi. Boshqa odam qo'shilishini kutamiz...");

    pc.onnegotiationneeded = async () => {
      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);
      await roomRef.child('offer').set({ type: offer.type, sdp: offer.sdp });
    };
    // trigger manually since onnegotiationneeded may not fire reliably across browsers
    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    await roomRef.child('offer').set({ type: offer.type, sdp: offer.sdp });

    roomRef.child('answer').on('value', async (snap) => {
      const ans = snap.val();
      if (ans && pc.signalingState !== 'stable'){
        await pc.setRemoteDescription(new RTCSessionDescription(ans));
      }
    });

    roomRef.child('calleeCandidates').on('child_added', (snap) => {
      pc.addIceCandidate(new RTCIceCandidate(snap.val())).catch(()=>{});
    });

  } else {
    // CALLEE: xonada offer bor, biz javob beramiz
    myRole = 'callee';
    setStatus("Xonaga ulanmoqda...");

    await pc.setRemoteDescription(new RTCSessionDescription(data.offer));
    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);
    await roomRef.child('answer').set({ type: answer.type, sdp: answer.sdp });

    roomRef.child('callerCandidates').on('child_added', (snap) => {
      pc.addIceCandidate(new RTCIceCandidate(snap.val())).catch(()=>{});
    });
  }

  listenersAttached = true;
}

async function leave(){
  if (pc){ pc.close(); pc = null; }
  if (localStream){ localStream.getTracks().forEach(t => t.stop()); localStream = null; }
  if (roomRef){
    if (myRole === 'caller'){
      // xona egasi chiqsa, xonani tozalaymiz
      try{ await roomRef.remove(); }catch(e){}
    }
    roomRef.off();
    roomRef = null;
  }
  localVideo.srcObject = null;
  remoteVideo.srcObject = null;
  localBox.classList.add('empty');
  remoteBox.classList.add('empty');
  joinBtn.disabled = false;
  leaveBtn.disabled = true;
  roomInput.disabled = false;
  myRole = null;
  setStatus("Suhbat tugatildi.");
}

micBtn.onclick = () => {
  if (!localStream) return;
  micOn = !micOn;
  localStream.getAudioTracks().forEach(t => t.enabled = micOn);
  micBtn.classList.toggle('toggled-off', !micOn);
  micBtn.textContent = micOn ? '🎤 Mikrofon' : '🔇 O\'chiq';
};
camBtn.onclick = () => {
  if (!localStream) return;
  camOn = !camOn;
  localStream.getVideoTracks().forEach(t => t.enabled = camOn);
  camBtn.classList.toggle('toggled-off', !camOn);
  camBtn.textContent = camOn ? '📷 Kamera' : '🚫 O\'chiq';
};

joinBtn.onclick = join;
leaveBtn.onclick = leave;
roomInput.addEventListener('keydown', e => { if (e.key === 'Enter') join(); });

window.addEventListener('beforeunload', () => { if (roomRef) leave(); });
</script>

</body>
</html>
