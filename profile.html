<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profil</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Rubik:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

  :root{
    --bg:#0B0E14; --bg2:#11161F; --card:#161D29; --line:#232C3A;
    --neon:#FFD23F; --neon2:#3FD2FF; --text:#E7EAF0; --muted:#8A94A6; --danger:#FF6B6B;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:radial-gradient(circle at 20% -10%, #1A2233 0%, var(--bg) 55%);
    color:var(--text); font-family:'Rubik',sans-serif; min-height:100vh;
  }
  .navbar{
    height:60px;background:rgba(11,14,20,0.9);backdrop-filter:blur(8px);
    border-bottom:1px solid var(--line);display:flex;align-items:center;
    justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:30;
  }
  .brand{color:var(--neon);font-family:'Orbitron',sans-serif;font-weight:800;font-size:18px;letter-spacing:1px;text-decoration:none;}
  .back{
    color:var(--text);text-decoration:none;font-family:'Orbitron',sans-serif;font-size:12px;
    letter-spacing:.5px;text-transform:uppercase;border:1px solid var(--line);padding:8px 14px;
    border-radius:6px;transition:.2s;
  }
  .back:hover{border-color:var(--neon2);color:var(--neon2);}

  .wrap{max-width:560px;margin:0 auto;padding:50px 20px 60px;}

  .profile-card{
    background:linear-gradient(160deg, var(--card), var(--bg2));
    border:1px solid var(--line);border-radius:18px;padding:36px 30px;
    box-shadow:0 20px 50px rgba(0,0,0,.35); position:relative; overflow:hidden;
  }
  .profile-card::before{
    content:'';position:absolute;top:0;left:0;right:0;height:3px;
    background:linear-gradient(90deg, var(--neon), var(--neon2));
  }

  .avatar-block{display:flex;flex-direction:column;align-items:center;gap:10px;margin-bottom:28px;}
  .avatar{
    width:84px;height:84px;border-radius:50%;
    background:linear-gradient(135deg, var(--neon), var(--neon2));
    display:flex;align-items:center;justify-content:center;
    font-family:'Orbitron',sans-serif;font-size:30px;font-weight:800;color:#1A1303;
  }
  .name-main{font-family:'Orbitron',sans-serif;font-size:22px;font-weight:800;letter-spacing:.5px;}
  .badge{
    font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.5px;
    color:var(--muted);text-transform:uppercase;padding:4px 10px;border:1px solid var(--line);
    border-radius:20px;
  }
  .badge.own{color:var(--neon2);border-color:var(--neon2);}

  .field{margin-bottom:16px;}
  .field label{
    display:block;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.5px;
    text-transform:uppercase;color:var(--muted);margin-bottom:6px;
  }
  .field input{
    width:100%;background:var(--bg);border:1px solid var(--line);color:var(--text);
    padding:11px 14px;border-radius:8px;font-family:'Rubik',sans-serif;font-size:14px;outline:none;
  }
  .field input:focus{border-color:var(--neon2);}
  .field input:disabled{
    color:var(--muted);background:var(--bg2);cursor:default;
  }

  .actions{display:flex;gap:10px;margin-top:24px;flex-wrap:wrap;}
  button{
    font-family:'Orbitron',sans-serif;font-size:11.5px;letter-spacing:.5px;text-transform:uppercase;
    font-weight:700;border:none;border-radius:8px;padding:11px 20px;cursor:pointer;
    transition:transform .15s, box-shadow .15s, opacity .15s;
  }
  .btn-primary{background:var(--neon);color:#1A1303;}
  .btn-primary:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(255,210,63,.3);}
  .btn-ghost{background:transparent;border:1px solid var(--line);color:var(--text);}
  .btn-ghost:hover{border-color:var(--neon2);color:var(--neon2);}

  .msg{margin-top:16px;font-size:13px;font-weight:500;min-height:18px;}
  .msg.ok{color:#7CDB8A;}
  .msg.err{color:var(--danger);}

  .notfound{text-align:center;color:var(--muted);padding:60px 20px;font-family:'JetBrains Mono',monospace;}
</style>
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="brand">Browser</a>
  <a href="chat.html" class="back">← Chatga qaytish</a>
</nav>

<div class="wrap" id="wrap">
  <!-- JS orqali to'ldiriladi -->
</div>

<script>
function getParam(name){
  return new URLSearchParams(window.location.search).get(name);
}

const wrap = document.getElementById('wrap');
const requestedUser = getParam('user');
const myUsername = localStorage.getItem('chat_username') || '';
const users = JSON.parse(localStorage.getItem('users')) || [];

const userIndex = users.findIndex(u => u.ism === requestedUser);
const isOwner = requestedUser && myUsername && requestedUser === myUsername;

if (userIndex === -1) {
  wrap.innerHTML = `<div class="notfound">Foydalanuvchi topilmadi: "${requestedUser || ''}"</div>`;
} else {
  const user = users[userIndex];
  const initial = (user.ism || '?').charAt(0).toUpperCase();

  wrap.innerHTML = `
    <div class="profile-card">
      <div class="avatar-block">
        <div class="avatar">${initial}</div>
        <div class="name-main">${user.ism} ${user.familiya || ''}</div>
        <span class="badge ${isOwner ? 'own' : ''}">${isOwner ? 'Bu sizning profilingiz' : 'Faqat ko\'rish'}</span>
      </div>

      <div class="field">
        <label>Ism</label>
        <input type="text" id="f-ism" value="${user.ism || ''}" ${isOwner ? '' : 'disabled'}>
      </div>
      <div class="field">
        <label>Familiya</label>
        <input type="text" id="f-familiya" value="${user.familiya || ''}" ${isOwner ? '' : 'disabled'}>
      </div>
      <div class="field">
        <label>Otasining ismi</label>
        <input type="text" id="f-otasini" value="${user.otasini || ''}" ${isOwner ? '' : 'disabled'}>
      </div>
      <div class="field">
        <label>Tug'ilgan sana</label>
        <input type="date" id="f-tugilgan" value="${user.tugilgan || ''}" ${isOwner ? '' : 'disabled'}>
      </div>
      <div class="field">
        <label>Gmail</label>
        <input type="email" id="f-gmail" value="${user.gmail || ''}" ${isOwner ? '' : 'disabled'}>
      </div>
      ${isOwner ? `
      <div class="field">
        <label>Yangi parol (bo'sh qoldirsa o'zgarmaydi)</label>
        <input type="password" id="f-parol" placeholder="••••••••">
      </div>` : ''}

      ${isOwner ? `
      <div class="actions">
        <button class="btn-primary" id="saveBtn">Saqlash</button>
      </div>
      <div class="msg" id="msg"></div>
      ` : ''}
    </div>
  `;

  if (isOwner) {
    document.getElementById('saveBtn').addEventListener('click', () => {
      const ism = document.getElementById('f-ism').value.trim();
      const familiya = document.getElementById('f-familiya').value.trim();
      const otasini = document.getElementById('f-otasini').value.trim();
      const tugilgan = document.getElementById('f-tugilgan').value.trim();
      const gmail = document.getElementById('f-gmail').value.trim();
      const newParol = document.getElementById('f-parol').value.trim();
      const msgEl = document.getElementById('msg');

      if (!ism || !familiya || !otasini || !tugilgan || !gmail) {
        msgEl.className = 'msg err';
        msgEl.textContent = "❌ Iltimos, barcha maydonlarni to'ldiring!";
        return;
      }

      const fresh = JSON.parse(localStorage.getItem('users')) || [];
      fresh[userIndex] = {
        ...fresh[userIndex],
        ism, familiya, otasini, tugilgan, gmail,
        parol: newParol ? newParol : fresh[userIndex].parol
      };
      localStorage.setItem('users', JSON.stringify(fresh));

      // login holatini yangi ismga moslab yangilash
      localStorage.setItem('chat_username', ism);
      localStorage.setItem('vs_username', ism);
      localStorage.setItem('chat_fullname', (ism + ' ' + familiya).trim());

      msgEl.className = 'msg ok';
      msgEl.textContent = "✅ Profil saqlandi!";

      // agar ism o'zgargan bo'lsa, URLni ham yangilab qo'yamiz
      if (ism !== requestedUser) {
        window.location.href = 'profile.html?user=' + encodeURIComponent(ism);
      }
    });
  }
}
</script>

</body>
</html>
